version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: scan_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  
  api:
    build: .
    container_name: scan_api
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ./app:/app

volumes:
  mongo_data: